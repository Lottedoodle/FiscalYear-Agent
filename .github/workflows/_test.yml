name: Test Template

on:
  workflow_call:
    secrets:
      DATABASE_URL:
        required: true
      OPENAI_API_KEY:
        required: true
      OPENAI_MODEL_NAME:
        required: true
      OPENAI_EMBEDDING_MODEL_NAME:
        required: true
      NEXT_PUBLIC_SUPABASE_URL:
        required: true
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_OR_ANON_KEY:
        required: true

jobs:
  k6-regression:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: |
          gunzip -c image.tar.gz | docker load

      - name: Show loaded images
        run: docker images

      - name: Create env file for container
        run: |
          cat > app.env <<EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL_NAME=${{ secrets.OPENAI_MODEL_NAME }}
          OPENAI_EMBEDDING_MODEL_NAME=${{ secrets.OPENAI_EMBEDDING_MODEL_NAME }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_OR_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_OR_ANON_KEY }}
          ALLOW_TEST_BYPASS=true
          EOF

      - name: Run App Container
        run: |
          docker run -d \
            --name app-container \
            -p 3000:3000 \
            --env-file app.env \
            test-app:latest

      - name: Show running containers
        run: docker ps -a

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API to be ready..."
          timeout 90s sh -c 'until curl -sf http://localhost:3000 > /dev/null; do echo "Still waiting..."; sleep 2; done'

      - name: Debug API response
        run: |
          curl -i -X POST http://localhost:3000/api/chat \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"role":"user","parts":[{"type":"text","text":"CI test"}]}],"sessionId":"ci-session","userId":"ci-test-user"}'

      - name: Execute k6
        run: |
          docker run --rm \
            --network host \
            -u "$(id -u):$(id -g)" \
            -v "$PWD:/scripts" \
            ghcr.io/grafana/k6:latest \
            run \
            --env BASE_URL=http://localhost:3000 \
            --out json=/scripts/results.json \
            /scripts/regression-test.js

      - name: Show container logs on failure
        if: failure()
        run: docker logs app-container || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f app-container 2>/dev/null || true
          rm -f app.env

      - name: Archive Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: results.json